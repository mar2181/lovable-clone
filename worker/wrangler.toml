name = "lovable-clone-backend"
main = "src/index.ts"
compatibility_date = "2024-03-20"

# R2 bucket for storing projects/files
[[r2_buckets]]
binding = "R2_PROJECTS"
bucket_name = "lovable-projects"

# KV store for user data and credits
[[kv_namespaces]]
binding = "KV_METADATA"
id = "762c5fc8290c44259c67922b75fa2d13"

[vars]
ENVIRONMENT = "development"

# R2 public domain for attachment URLs. Set this to your R2 bucket's public
# custom domain or the r2.dev domain (e.g. "https://pub-<hash>.r2.dev").
# Without it, attachment uploads will return 500.
R2_PUBLIC_DOMAIN = "https://pub-e52c67ab7c214282b6a2dd26d84e0cc3.r2.dev"

# Secrets (loaded from .dev.vars for local dev, wrangler secret put for production)
# CLERK_SECRET_KEY
# OPENROUTER_API_KEY
# FAL_KEY
# SUPABASE_PAT              (Personal Access Token from supabase.com/dashboard/account/tokens)

# Daily garbage-collection cron (03:00 UTC) — cleans up orphaned attachment
# R2 objects and GC markers.
[triggers]
crons = ["0 3 * * *"]

# Local dev: pin port to avoid collision with other services
[dev]
port = 8788
