name = "lovable-clone-backend"
main = "src/index.ts"
compatibility_date = "2024-03-20"

# R2 bucket for storing projects/files
[[r2_buckets]]
binding = "R2_PROJECTS"
bucket_name = "lovable-projects"

# KV store for user data and credits
[[kv_namespaces]]
binding = "KV_METADATA"
id = "local_dev_kv_placeholder_id"

[vars]
ENVIRONMENT = "development"

# Secrets (loaded from .dev.vars for local dev, or wrangler secret put for production)
# Required:
#   CLERK_DOMAIN                — Clerk frontend API domain (no protocol)
#   CLERK_SECRET_KEY            — from Clerk Dashboard
#   NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY — from Clerk Dashboard
#   OPENROUTER_API_KEY          — from openrouter.ai/keys
#   FAL_KEY                     — from fal.ai/dashboard/keys
# Optional:
#   GITHUB_PAT                  — from github.com/settings/tokens
#   VERCEL_API_KEY              — from vercel.com/account/tokens
#   ALLOWED_ORIGINS             — comma-separated extra CORS origins
